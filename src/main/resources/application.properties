# Dùng biến môi trường từ file .env (local) hoặc Render (production)
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?ssl-mode=REQUIRED
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# --- SERVER CONFIG ---
# 👇 Giúp OAuth2 và Swagger nhận diện đúng HTTPS trên Railway/Render
server.forward-headers-strategy=native

# --- SESSION COOKIE (LOCAL DEFAULT) ---
# Khi FE chạy localhost và BE deploy domain khác (cross-site), cookie cần SameSite=None + Secure=true.
# Nhưng nếu bạn chạy BE local (http://localhost), Secure=true sẽ làm cookie không set được.
# Vì vậy: default để Lax/secure=false và override bằng env khi cần.
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAMESITE:lax}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.path=/
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Fix Tomcat 11 multipart max part count (file + fields)
server.tomcat.max-part-count=200

# Các cấu hình khác giữ nguyên
# Dùng validate thay vì update để tránh Hibernate tự động thay đổi schema khi có foreign key constraints
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Tắt globally_quoted_identifiers để tránh lỗi SQL syntax với ENUM
spring.jpa.properties.hibernate.globally_quoted_identifiers=false

# --- COGNITO (Dùng biến môi trường) ---
spring.security.oauth2.client.registration.cognito.client-id=${COGNITO_CLIENT_ID}
spring.security.oauth2.client.registration.cognito.client-secret=${COGNITO_CLIENT_SECRET}
spring.security.oauth2.client.registration.cognito.scope=openid,email,profile
spring.security.oauth2.client.registration.cognito.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.cognito.authorization-grant-type=authorization_code
spring.security.oauth2.client.provider.cognito.issuer-uri=${COGNITO_ISSUER_URI}
spring.security.oauth2.client.registration.cognito.client-name=Cognito
spring.security.oauth2.resourceserver.jwt.issuer-uri=${COGNITO_ISSUER_URI}
# --- Application URLs (có thể override bằng environment variables) ---
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.backend.url=${BACKEND_URL:http://localhost:8080}

# --- AI COACH (Python Microservice) ---
app.ai.service.url=https://trungne08-nutrimate-ai-coach.hf.space/api/ai/chat

# --- PAYOS ---
payos.client-id=${PAYOS_CLIENT_ID:}
payos.api-key=${PAYOS_API_KEY:}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:}

# --- ZEGO VIDEO CALL ---
ZEGO_APP_ID=${ZEGO_APP_ID:0}
ZEGO_SERVER_SECRET=${ZEGO_SERVER_SECRET:}

# --- SWAGGER UI CONFIG ---
# Sort tags theo alphabet trong Swagger UI
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG